<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codez Games X</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>🎮 Codez X</h2>

  <button onclick="filter('all')">🏠 Home</button>
  <button onclick="filter('action')">🔥 Action</button>
  <button onclick="filter('puzzle')">🧠 Puzzle</button>
  <button onclick="filter('arcade')">🎯 Arcade</button>

  <hr>

  <h4>⭐ Quick</h4>
  <button onclick="showFavorites()">Favorites</button>
  <button onclick="showRecent()">Recent</button>
</div>

<!-- MAIN -->
<div class="main">

  <input id="search" placeholder="Search games...">

  <div id="grid" class="grid"></div>

</div>

</div>

<!-- GAME MODAL -->
<div id="modal" class="modal">
  <div class="modalBox">
    <span onclick="closeGame()" class="close">✖</span>
    <h2 id="title"></h2>
    <iframe id="frame"></iframe>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
